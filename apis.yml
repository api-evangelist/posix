aid: posix
name: POSIX
description: >-
  POSIX (Portable Operating System Interface) is a family of IEEE and Open
  Group standards that define a consistent operating system API, command
  line shell, and utility interfaces for maintaining compatibility between
  Unix and Unix-like systems. It is a specification rather than a network
  API, and there is no public REST or HTTP interface for the standard.
